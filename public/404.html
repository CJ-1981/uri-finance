    <!-- Theme color for iOS status bar (iOS 15+) -->
    <meta name="theme-color" content="#f8fafc" />
    <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)" />
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('theme');
          const supportDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches === true;
          if (theme === 'dark' || (!theme && supportDarkMode)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
    <script type="module">
      // Redirect to index.html while preserving the route for GitHub Pages SPA routing
      const sessionKey = 'redirect-path';
      const path = window.location.pathname + window.location.search + window.location.hash;
      sessionStorage.setItem(sessionKey, path);
      window.location.replace('/uri-finance/index.html');
    </script>
