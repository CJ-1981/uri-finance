name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build with Vite environment variables
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}
          VITE_SYSTEM_ADMIN_EMAILS: ${{ secrets.VITE_SYSTEM_ADMIN_EMAILS }}
          VITE_APP_TITLE: ${{ github.event_name == 'pull_request' && '재정부 (Preview)' || '우리교회 재정부' }}
          VITE_APP_ICON_SUFFIX: ${{ github.event_name == 'pull_request' && '-preview' || '' }}
          VITE_APP_AUTH_TITLE: ${{ secrets.VITE_APP_AUTH_TITLE }}
          VITE_APP_AUTH_SUBTITLE: ${{ secrets.VITE_APP_AUTH_SUBTITLE }}
          VITE_APP_AUTH_TITLE_KO: ${{ secrets.VITE_APP_AUTH_TITLE_KO }}
          VITE_APP_AUTH_SUBTITLE_KO: ${{ secrets.VITE_APP_AUTH_SUBTITLE_KO }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4